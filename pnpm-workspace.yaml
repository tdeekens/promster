packages:
  - packages/*
  - tooling/*
# pnpm >=11 enables a minimum-release-age install cooldown by default,
# which makes `pnpm install --frozen-lockfile` (CI) fail whenever the
# lockfile references a package published within the cooldown window.
# Set to 0 to opt out so freshly published dependency bumps install in CI.
minimumReleaseAge: 0
allowBuilds:
  '@apollo/protobufjs': true
  '@sematext/gc-stats': true
  esbuild: true
